{{ define "main" }}
<div class="post">
  <h1 class="post-title">{{ .Title }}</h1>
  
  <div class="search-container">
    <input type="text" id="search-input" placeholder="Escribe para buscar..." autocomplete="off" 
           style="width: 100%; padding: 15px; margin-bottom: 30px; background: transparent; color: var(--foreground); border: 2px solid var(--accent); font-family: inherit; font-size: 1.1em; outline: none;">
    
    <ul id="search-results" style="list-style: none; margin-left: 0; padding: 0;"></ul>
  </div>
</div>

<script>
  window.addEventListener('DOMContentLoaded', async (event) => {
    const input = document.getElementById('search-input');
    const results = document.getElementById('search-results');

    try {
      const pagefind = await import("/pagefind/pagefind.js");
      
      input.addEventListener('input', async function() {
        const query = this.value;
        results.innerHTML = ''; 

        if (query.length === 0) return;

        const search = await pagefind.search(query);

        if (search.results.length === 0) {
          results.innerHTML = '<li style="opacity: 0.7;">No se encontraron resultados...</li>';
          return;
        }

        const topResults = search.results.slice(0, 8);

        for (const result of topResults) {
          const data = await result.data(); 
          
          const li = document.createElement('li');
          li.style.marginBottom = '20px';
          li.style.paddingBottom = '15px';
          li.style.borderBottom = '1px dashed var(--accent)';
          
          li.innerHTML = `
            <a href="${data.url}" style="font-size: 1.25em; font-weight: bold; color: var(--accent); text-decoration: none;">${data.meta.title}</a>
            <p style="font-size: 0.9em; opacity: 0.8; margin-top: 5px;">${data.excerpt}</p>
          `;
          results.appendChild(li);
        }
      });
    } catch (e) {
      console.warn("Pagefind aún no ha indexado el sitio. Ejecuta el comando de construcción.");
      results.innerHTML = '<li style="opacity: 0.7;">[Sistema]: El índice de búsqueda se generará al compilar el sitio.</li>';
    }
  });
</script>
{{ end }}
