{{ define "main" }}
<div class="post">
  <h1 class="post-title">{{ .Title }}</h1>
  
  <div class="search-container" style="margin-top: 20px;">
    <input type="text" id="search-input" autocomplete="off" placeholder="Escribe para buscar artículos..." 
           style="width: 100%; padding: 10px; background: var(--background); color: var(--foreground); border: 2px solid var(--accent); border-radius: 4px;">
    
    <ul id="search-results" style="list-style: none; padding: 0; margin-top: 20px;"></ul>
  </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', async (event) => {
    const pagefindUrl = "{{ absURL "pagefind/pagefind.js" }}";
    
    try {
        const pagefind = await import(pagefindUrl);
        await pagefind.init();

        const searchInput = document.getElementById("search-input");
        const resultsList = document.getElementById("search-results");

        searchInput.addEventListener("input", async (e) => {
            const query = e.target.value;
            resultsList.innerHTML = ""; 

            if (query.length > 0) {
                const search = await pagefind.search(query);
                
                for (const result of search.results) {
                    const data = await result.data();
                    const li = document.createElement("li");
                    li.style.marginBottom = "15px";
                    
                    li.innerHTML = `
                        <a href="${data.url}" style="color: var(--accent); font-weight: bold; text-decoration: none;">${data.meta.title}</a>
                        <p style="margin-top: 5px; font-size: 0.9em; opacity: 0.8;">${data.excerpt}</p>
                    `;
                    resultsList.appendChild(li);
                }
            }
        });
    } catch (e) {
        console.log("Pagefind aún no está indexado en este entorno.");
    }
});
</script>
{{ end }}
