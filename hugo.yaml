baseURL: http://localhost:1313/
languageCode: es-419
title: building.nicolasmino.dev
module:
   hugoVersion:
    extended: true
    min: "0.112.0"
    mounts:
    - source: assets
      target: assets
    - disableWatch: true
      source: hugo_stats.json
      target: assets/notwatching/hugo_stats.json
params:
  contact:
    email: info@example.org
    phone: +1 202-555-1212
build:
  buildStats:
    enable: true
  cachebusters:
  - source: 'assets/notwatching/hugo_stats\.json'
    target: css
  - source: '(postcss|tailwind)\.config\.js'
    target: css